<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Security-Policy"
        content="base-uri 'self'; 
        default-src 'self'; 
        style-src 'self'; 
        script-src 'self'; 
        img-src 'self' *; 
        media-src 'self'; 
        font-src 'self'; 
        connect-src 'self'; 
        object-src 'self'; 
        worker-src 'self'; 
        frame-src 'none'; 
        form-action 'self'; 
        manifest-src 'self'"
        />
    <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <title>Real World Maths</title>
        <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/logo.png') }}" />
        <meta name="theme-color" content="#14E6DD" />
    </head>
    <body>  
    <main>
        <nav>
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Real World Maths" />
            <h1>Real World Maths</h1>
            <ul class="topnav">
                <a href="/success.html" class="hidden-link">Home</a>
                <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark mode">🌙</button>
            </ul>
        </nav>
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
