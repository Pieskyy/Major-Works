{% extends 'layout.html' %} {% block content %}
<div class="error-container">
  <h1>Signup Error</h1>
  <div class="error-box">
    <p class="error-message">{{ error }}</p>
    <p>This username is already taken by another user.</p>
    <div class="action-buttons">
      <a href="/signup.html" class="btn">Try Another Username</a>
      <a href="/login" class="btn secondary-btn">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
