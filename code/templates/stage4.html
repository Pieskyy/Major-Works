{% extends 'layout.html' %} {% block content %}
<section class="stage-page">
    <div class="page-header">
        <h1>{{ stage_content.title }}</h1>
        <p>{{ stage_content.subtitle }}</p>
    </div>
    <div class="topic-grid">
        {% for topic in topics %}
            <a href="/stage{{ stage }}/topic/{{ topic.id }}" class="btn topic-card">{{ topic.name }}</a>
        {% endfor %}
    </div>
    <div class="page-actions">
        <a href="/success.html" class="btn secondary-btn">Back to Stages</a>
    </div>
</section>
{% endblock %}
