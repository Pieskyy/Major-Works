{% extends 'layout.html' %} {% block content %}
<section class="stage-selection">
    <div class="stage-selection__inner">
        <div class="search-wrapper">
            <form action="/search" method="get" class="search-form">
                <input type="search" name="q" placeholder="Search topics across all stages" class="input__field search-input" autocomplete="off" />
                <button type="submit" class="btn">Search</button>
            </form>
        </div>

        <div class="stage-choice-grid">
          <a href="/stage4" class="btn stage-card">Stage 4</a>
          <a href="/stage5" class="btn stage-card">Stage 5</a>
          <a href="/stage6" class="btn stage-card">Stage 6</a>
        </div>
    </div>
</section>
{% endblock %}
